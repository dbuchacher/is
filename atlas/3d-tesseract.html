<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atlas — Tesseract</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d0d10; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
canvas { display: block; }
#ui {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 50; display: flex; gap: 8px; align-items: center;
}
#ui button {
  background: none; border: 1px solid #2a2a32; color: #7f8490;
  font: inherit; font-size: 12px; padding: 5px 14px; border-radius: 14px;
  cursor: pointer;
}
#ui button:hover { border-color: #b39df3; color: #b39df3; }
#ui button.active { border-color: #b39df3; color: #b39df3; background: #b39df315; }
#ui .sep { color: #2a2a32; font-size: 10px; }
#view-label {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 50; font-size: 11px; color: #54487A; text-align: center;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="view-label"></div>
<div id="ui">
  <button data-axis="3" class="active">τ time</button>
  <button data-axis="0">χ space</button>
  <button data-axis="1">μ mass</button>
  <button data-axis="2">φ signal</button>
  <span class="sep">│</span>
  <button id="frame-btn" data-frame="local">local</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const BG = 0x0d0d10, RED = 0xfc5d7c, GREEN = 0x9ed072, GREY = 0x7f8490;
const BLUE = 0x76cce0, PURPLE = 0xb39df3, YELLOW = 0xe7c664, WHITE = 0xe2e2e3;

// dimension names and colors: [χ, μ, φ, τ]
const DIM_NAMES = ['χ space', 'μ mass', 'φ signal', 'τ time'];
const DIM_COLORS = [BLUE, GREEN, YELLOW, PURPLE];

const scene = new THREE.Scene();
scene.background = new THREE.Color(BG);
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 200);
camera.position.set(6, 4, 8);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const light = new THREE.DirectionalLight(0xffffff, 0.5);
light.position.set(5, 8, 6);
scene.add(light);

// ══════════════════════════════════════════════
// GENERIC 4D → 3D PROJECTION
// coords: [χ, μ, φ, τ] = [space, mass, signal, time]
// projAxis: which dim to project through (0-3)
// nonlocal: if true, that dim drives quaternion rotation
// sign: +1 hylo, -1 meta
// ══════════════════════════════════════════════
const S = 1.5;
const CAM4D = 3.0;

function project(coord, projAxis, nonlocal, sign = 1) {
  const depth = coord[projAxis];
  const w = CAM4D / (CAM4D - depth);

  // remaining 3 dims (skip projAxis)
  const idx = [];
  for (let i = 0; i < 4; i++) if (i !== projAxis) idx.push(i);
  let a = coord[idx[0]], b = coord[idx[1]], c = coord[idx[2]];

  if (nonlocal) {
    const angle = depth * Math.PI / 2 * sign;
    const h = angle / 2;
    const cH = Math.cos(h), sH = Math.sin(h);
    const sq3 = 1 / Math.sqrt(3);
    const rw = cH, rx = sH * sq3, ry = sH * sq3, rz = sH * sq3;
    // q · v · q⁻¹
    const qvw = -rx*a - ry*b - rz*c;
    const qvx = rw*a + ry*c - rz*b;
    const qvy = rw*b + rz*a - rx*c;
    const qvz = rw*c + rx*b - ry*a;
    a = qvw*(-rx) + qvx*rw + qvy*(-rz) - qvz*(-ry);
    b = qvw*(-ry) + qvy*rw + qvz*(-rx) - qvx*(-rz);
    c = qvw*(-rz) + qvz*rw + qvx*(-ry) - qvy*(-rx);
  }

  return new THREE.Vector3(a * w * S, b * w * S, c * w * S);
}

// ══════════════════════════════════════════════
// VIEW STATE + MORPH
// ══════════════════════════════════════════════
let viewAxis = 3;       // project through τ
let viewNonlocal = false; // local frame
let targetAxis = 3;
let targetNonlocal = false;
let morphRaw = 1;       // raw 0→1 progress
let morphEased = 1;     // eased value used for lerping
let morphing = false;
const MORPH_SPEED = 1.5;

// snapshot: positions at the "from" state
let fromPositions = null; // will be filled on morph start
let fromDiagHylo = null;
let fromDiagMeta = null;

function currentProject(coord, sign = 1) {
  return project(coord, viewAxis, viewNonlocal, sign);
}
function targetProject(coord, sign = 1) {
  return project(coord, targetAxis, targetNonlocal, sign);
}

function startMorph(newAxis, newNonlocal) {
  if (newAxis === viewAxis && newNonlocal === viewNonlocal) return;
  // snapshot current positions
  fromPositions = verts4D.map(v => currentProject(v));
  fromDiagHylo = [];
  fromDiagMeta = [];
  for (let i = 0; i <= DIAG_STEPS; i++) {
    const t = -1 + 2 * i / DIAG_STEPS;
    fromDiagHylo.push(currentProject([t,t,t,t], +1));
    fromDiagMeta.push(currentProject([t,t,t,t], -1));
  }
  targetAxis = newAxis;
  targetNonlocal = newNonlocal;
  morphRaw = 0;
  morphEased = 0;
  morphing = true;
}

function finishMorph() {
  viewAxis = targetAxis;
  viewNonlocal = targetNonlocal;
  morphRaw = 1;
  morphEased = 1;
  morphing = false;
}

// ══════════════════════════════════════════════
// TESSERACT
// ══════════════════════════════════════════════
const verts4D = [];
for (let chi = -1; chi <= 1; chi += 2)
  for (let mu = -1; mu <= 1; mu += 2)
    for (let phi = -1; phi <= 1; phi += 2)
      for (let tau = -1; tau <= 1; tau += 2)
        verts4D.push([chi, mu, phi, tau]);

function vertColor(v) {
  if (v[0] === v[1] && v[1] === v[2] && v[2] === v[3]) return v[3] === 1 ? GREEN : RED;
  return v[3] === 1 ? 0x555560 : 0x333338;
}
function vertRadius(v) {
  if (v[0] === v[1] && v[1] === v[2] && v[2] === v[3]) return 0.07;
  return 0.03;
}

const vertMeshes = verts4D.map(v => {
  const color = vertColor(v);
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(vertRadius(v), 16, 12),
    new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: 0.3,
      roughness: 0.3, metalness: 0.05,
    }),
  );
  scene.add(mesh);
  return mesh;
});

// edges
const edges = [];
for (let i = 0; i < verts4D.length; i++) {
  for (let j = i + 1; j < verts4D.length; j++) {
    let diff = 0, axis = -1;
    for (let k = 0; k < 4; k++) {
      if (verts4D[i][k] !== verts4D[j][k]) { diff++; axis = k; }
    }
    if (diff === 1) {
      const geo = new THREE.BufferGeometry();
      const pos = new Float32Array(6);
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      const mat = new THREE.LineDashedMaterial({
        color: DIM_COLORS[axis], transparent: true, opacity: 0.25,
        dashSize: 0.1, gapSize: 0.08,
      });
      const line = new THREE.Line(geo, mat);
      scene.add(line);
      edges.push({ i, j, line, geo });
    }
  }
}

// diagonal lines
const DIAG_STEPS = 80;
function makeDiagLine(color) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array((DIAG_STEPS + 1) * 3);
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({
    color, transparent: true, opacity: 0.7,
  }));
  scene.add(line);
  return { line, geo };
}
const diagHylo = makeDiagLine(YELLOW);
const diagMeta = makeDiagLine(PURPLE);

// neutrino
const neutrino = new THREE.Mesh(
  new THREE.SphereGeometry(0.05, 16, 12),
  new THREE.MeshStandardMaterial({
    color: 0x444450, emissive: 0x444450, emissiveIntensity: 0.5,
    roughness: 0.2, metalness: 0.1,
  }),
);
scene.add(neutrino);

// ══════════════════════════════════════════════
// UPDATE POSITIONS
// ══════════════════════════════════════════════
function updatePositions() {
  const m = morphEased;

  // vertices
  for (let i = 0; i < verts4D.length; i++) {
    const to = targetProject(verts4D[i]);
    if (morphing && fromPositions) {
      vertMeshes[i].position.copy(fromPositions[i].clone().lerp(to, m));
    } else {
      vertMeshes[i].position.copy(to);
    }
  }

  // edges
  for (const e of edges) {
    const a = vertMeshes[e.i].position;
    const b = vertMeshes[e.j].position;
    const p = e.geo.attributes.position.array;
    p[0] = a.x; p[1] = a.y; p[2] = a.z;
    p[3] = b.x; p[4] = b.y; p[5] = b.z;
    e.geo.attributes.position.needsUpdate = true;
    e.line.computeLineDistances();
  }

  // diagonals
  function updateDiag(diagObj, sign, fromArr) {
    const dp = diagObj.geo.attributes.position.array;
    for (let i = 0; i <= DIAG_STEPS; i++) {
      const t = -1 + 2 * i / DIAG_STEPS;
      const to = targetProject([t,t,t,t], sign);
      let p;
      if (morphing && fromArr) {
        p = fromArr[i].clone().lerp(to, m);
      } else {
        p = to;
      }
      dp[i*3] = p.x; dp[i*3+1] = p.y; dp[i*3+2] = p.z;
    }
    diagObj.geo.attributes.position.needsUpdate = true;
  }
  updateDiag(diagHylo, +1, fromDiagHylo);
  updateDiag(diagMeta, -1, fromDiagMeta);
}

// ══════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════
const axisButtons = document.querySelectorAll('[data-axis]');
const frameBtn = document.getElementById('frame-btn');
const viewLabel = document.getElementById('view-label');

const VIEW_LABELS = [
  ['through τ · local', 'through τ · non-local'],
  ['through χ · local', 'through χ · non-local'],
  ['through μ · local', 'through μ · non-local'],
  ['through φ · local', 'through φ · non-local'],
];
// axis index in our array: button data-axis maps to coord index
// buttons: τ=3, χ=0, μ=1, φ=2

function updateUI() {
  axisButtons.forEach(b => b.classList.toggle('active', parseInt(b.dataset.axis) === targetAxis));
  frameBtn.classList.toggle('active', targetNonlocal);
  frameBtn.textContent = targetNonlocal ? 'non-local' : 'local';
  // view number (1-8)
  const axisOrder = [3,0,1,2]; // τ,χ,μ,φ
  const viewNum = axisOrder.indexOf(targetAxis) * 2 + (targetNonlocal ? 2 : 1);
  const axisNames = { 3: 'τ', 0: 'χ', 1: 'μ', 2: 'φ' };
  viewLabel.textContent = `view ${viewNum}/8 · through ${axisNames[targetAxis]} · ${targetNonlocal ? 'non-local' : 'local'}`;
}

axisButtons.forEach(b => {
  b.addEventListener('click', () => {
    const axis = parseInt(b.dataset.axis);
    startMorph(axis, targetNonlocal);
    updateUI();
  });
});

frameBtn.addEventListener('click', () => {
  startMorph(targetAxis, !targetNonlocal);
  updateUI();
});

updateUI();

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Easing ──
function ease(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
}

// ── Loop ──
let lastTime = performance.now() / 1000;
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now() / 1000;
  const dt = now - lastTime;
  lastTime = now;

  if (morphing) {
    morphRaw += dt * MORPH_SPEED;
    if (morphRaw >= 1) finishMorph();
    else morphEased = ease(morphRaw);
  }

  updatePositions();
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
